<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 말투 변환기</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💼 업무 말투 변환기</h1>
            <p>전달하고 싶은 내용을 수신자에 맞는 비즈니스 어조로 변환해드립니다.</p>
        </header>

        <main>
            <section class="selection-section">
                <h3>1. 받는 사람을 선택하세요</h3>
                <div class="target-group" id="targetGroup">
                    <button type="button" class="target-btn" data-target="boss">👔 상사/임원</button>
                    <button type="button" class="target-btn" data-target="colleague">🤝 타팀 동료</button>
                    <button type="button" class="target-btn" data-target="client">🌐 고객/외부</button>
                    <button type="button" class="target-btn" data-target="team">👥 팀 내 동료</button>
                </div>
            </section>

            <section class="input-section">
                <h3>2. 내용을 입력하세요</h3>
                <textarea id="inputText" placeholder="예: 내일까지 보고서 제출 어려울 것 같음 (일상적인 말투로 편하게 입력하세요)"></textarea>
            </section>

            <div class="action-section">
                <button id="convertBtn" class="primary-btn">변환하기</button>
            </div>

            <section class="output-section" id="outputSection" style="display: none;">
                <h3>3. 변환 결과</h3>
                <div class="result-container">
                    <textarea id="outputText" readonly></textarea>
                    <button id="copyBtn" class="secondary-btn">복사하기 📋</button>
                </div>
            </section>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>변환 중입니다...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 업무 말투 변환기. All rights reserved.</p>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
